version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - model

  frontend:
    build:
      context: ./frontend/vite-project
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/vite-project:/app
      - /app/node_modules
    depends_on:
      - backend

  model:
    build:
      context: ./model
    ports:
      - "8000:8000"